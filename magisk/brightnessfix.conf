# BrightnessFix Hardware Dimmer - configuration
# Edit the values below, then reboot (or restart the daemon).

# Path to the backlight brightness sysfs node.
# Leave this as-is to auto-detect a common backlight path, or set it manually
# if your device uses something unusual.
BL_PATH="/sys/class/leds/lcd-backlight/brightness"

# Path to the max value node (used only for logging/reference).
MAX_PATH="/sys/class/leds/lcd-backlight/max_brightness"

# Hardware value to force when the slider is at minimum.
# IMPORTANT: this is a RAW sysfs integer (whole number), NOT a 0.0-1.0 value.
# 1 is the dimmest "on" value (0 usually turns the backlight off). The brightest
# is max_brightness (see the daemon log line: "range: max_brightness=...").
# Decimals like 0.1 are invalid and will be ignored (reset to 1).
FLOOR=1

# Override threshold (RAW sysfs integer). If the framework sets the backlight to
# this value or lower (but above FLOOR), the daemon rewrites it to FLOOR.
#
# How to find it: set screen brightness to MINIMUM, then read the daemon log:
#     /data/adb/modules/brightnessfix_hwdim/brightnessfix.log
# Use the line: range: max_brightness=<M> first_read=<N>
# Start with TRIGGER=<N> (or slightly above). Keep TRIGGER > FLOOR.
TRIGGER=12

# Poll interval (seconds) while the screen is ON.
# Lower values react faster but consume more wakeups.
POLL_ON=1.5

# Poll interval (seconds) while the screen is OFF (backlight reads 0).
# Keep this high to avoid impacting deep sleep.
POLL_OFF=30
